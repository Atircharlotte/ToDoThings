name: AI Code Review on Push

on:
  push:
    branches:
      - main
      - test # Add or remove branches you want to trigger the review
    paths-ignore:
      - '**/*.md' # Optional: skip reviews if only markdown files change

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial: Allows the bot to write comments on the commit

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Fetches the current commit and its parent to allow git diff HEAD~1
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install google-generativeai requests

      - name: Run AI Code Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/ai_reviewer.py
